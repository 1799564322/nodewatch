services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: nodewatch
      POSTGRES_USER: nodewatch
      POSTGRES_PASSWORD: nodewatch
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_local_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nodewatch -d nodewatch"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_local_data:

