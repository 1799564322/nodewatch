name: nodewatch

services:
  db:
    image: ${POSTGRES_IMAGE:?请设置固定版本 POSTGRES_IMAGE}
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?请设置 POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?请设置 POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:?请设置 POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    mem_limit: 768m
    cpus: 0.75
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

  app:
    image: ${NODEWATCH_IMAGE:?请设置固定版本 NODEWATCH_IMAGE}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_ENV: production
      APP_VERSION: ${APP_VERSION:?请设置 APP_VERSION}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      SECRET_KEY: ${SECRET_KEY:?请设置 SECRET_KEY}
      SESSION_COOKIE_NAME: ${SESSION_COOKIE_NAME:-nodewatch_session}
      SESSION_TTL_SECONDS: ${SESSION_TTL_SECONDS:-604800}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-true}
      ALLOWED_HOSTS: 127.0.0.1,localhost,${ALLOWED_HOSTS:?请设置 ALLOWED_HOSTS}
      BOOTSTRAP_ADMIN_USERNAME: ${BOOTSTRAP_ADMIN_USERNAME:-}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:-}
      DEFAULT_COLLECT_INTERVAL_SECONDS: ${DEFAULT_COLLECT_INTERVAL_SECONDS:-60}
      MAX_AGENT_BATCH_SAMPLES: ${MAX_AGENT_BATCH_SAMPLES:-500}
      OFFLINE_AFTER_SECONDS: ${OFFLINE_AFTER_SECONDS:-180}
      RAW_METRIC_RETENTION_DAYS: ${RAW_METRIC_RETENTION_DAYS:-30}
      RUN_SCHEDULER: "true"
    ports:
      - "127.0.0.1:8000:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health/live', timeout=3)",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    mem_limit: 512m
    cpus: 0.75
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

volumes:
  postgres_data:
